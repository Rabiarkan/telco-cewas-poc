services:
  postgres:
    image: postgres:16
    container_name: cewas_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: cewas_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root ${MLFLOW_DEFAULT_ARTIFACT_ROOT}
      --host 0.0.0.0
      --port 5000


  app:
      build:
        context: .
        dockerfile: Dockerfile.base
      container_name: cewas_app
      env_file:
        - .env
      volumes:
        - ./:/home/jovyan/work
      depends_on:
        postgres:
          condition: service_healthy
        mlflow:
          condition: service_started
      command: >
        bash -lc "tail -f /dev/null"
      tty: true

  jupyter:
      build:
        context: .
        dockerfile: Dockerfile.base
      container_name: cewas_jupyter
      env_file:
        - .env
      ports:
        - "8888:8888"
      volumes:
        - ./:/home/jovyan/work
        - jupyterdata:/home/jovyan
      depends_on:
        postgres:
          condition: service_healthy
        mlflow:
          condition: service_started
      command: >
        bash -lc "start-notebook.sh
                  --NotebookApp.token=${JUPYTER_TOKEN}
                  --NotebookApp.ip=0.0.0.0
                  --NotebookApp.port=8888
                  --NotebookApp.notebook_dir=/home/jovyan/work"


volumes:
  pgdata:
  mlruns:
  jupyterdata:

